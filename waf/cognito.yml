# Cognito WAF Configuration
# Web ACL for Cognito authentication endpoints (regional scope)

name: EidolonCognitoWebACL
scope: REGIONAL
description: WAF protection for Cognito authentication and user management

default_action: allow

rules:
  # Priority 0: General Cognito API rate limiting (all operations)
  - name: RateLimitCognitoAPI
    priority: 0
    statement:
      rate_based:
        limit: 20
        aggregate_key_type: IP
    action: block
    visibility:
      sampled_requests: true
      cloudwatch_metrics: true
      metric_name: CognitoAPIRateLimit

# CloudWatch integration
cloudwatch:
  metrics_enabled: true
  sampled_requests_enabled: true

