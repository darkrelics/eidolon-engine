# CloudFront WAF Configuration
# Web ACL for CloudFront distribution (global scope)

name: EidolonCloudFrontWebACL
scope: CLOUDFRONT
description: WAF protection for CloudFront CDN serving web clients

default_action: allow

rules:
  # Priority 0: Rate limiting for general requests
  - name: RateLimitGeneral
    priority: 0
    statement:
      rate_based:
        limit: 2000
        aggregate_key_type: IP
        scope_down_statement: null
    action: block
    visibility:
      sampled_requests: true
      cloudwatch_metrics: true
      metric_name: CloudFrontRateLimitGeneral

  # Priority 1: AWS Managed Rule - IP Reputation
  - name: AWSManagedRulesIPReputation
    priority: 1
    statement:
      managed_rule_group:
        vendor_name: AWS
        name: AWSManagedRulesAmazonIpReputationList
        excluded_rules: []
    action: override_to_count
    visibility:
      sampled_requests: true
      cloudwatch_metrics: true
      metric_name: CloudFrontIPReputation

# CloudWatch integration
cloudwatch:
  metrics_enabled: true
  sampled_requests_enabled: true

# Custom response for blocked requests
custom_response:
  response_code: 403
  response_headers:
    - name: X-WAF-Block-Reason
      value: rate-limit-exceeded
