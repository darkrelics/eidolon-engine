# CloudFront WAF Configuration
# Web ACL for CloudFront distribution (global scope)

name: EidolonCloudFrontWebACL
scope: CLOUDFRONT
description: WAF protection for CloudFront CDN serving web clients

default_action: allow

rules:
  # Priority 0: Rate limiting for general requests
  - name: RateLimitGeneral
    priority: 0
    statement:
      rate_based:
        limit: 2000
        aggregate_key_type: IP
        scope_down_statement: null
    action: block
    visibility:
      sampled_requests: true
      cloudwatch_metrics: true
      metric_name: CloudFrontRateLimitGeneral

# CloudWatch integration
cloudwatch:
  metrics_enabled: true
  sampled_requests_enabled: true

