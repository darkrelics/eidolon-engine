      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EidolonApi}/*"

  # ============================================================
  # Deployment and Stage
  # ============================================================
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RootOptions
      - ArchetypeOptions
      - ArchetypeGet
      - CharacterOptions
      - CharacterPost
      - CharacterGet
      - CharacterDelete
      - CharacterListOptions
      - CharacterListGet
      - ItemOptions
      - ItemBriefOptions
      - ItemBriefGet
      - ItemPrototypeOptions
      - ItemPrototypeGet
      - ItemConsumeOptions
      - ItemConsumePost
      - ItemDiscardOptions
      - ItemDiscardPost
      - ItemConsolidateOptions
      - ItemConsolidatePost
      - ItemSplitOptions
      - ItemSplitPost
      - StoreListOptions
      - StoreListGet
      - StorePurchaseOptions
      - StorePurchasePost
    Properties:
      RestApiId: !Ref EidolonApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref EidolonApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      Tags:
        - Key: System
          Value: eidolon

  # ============================================================
  # Custom Domain, Base Path Mapping, Route53
  # ============================================================
  ApiDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: System
          Value: eidolon

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiDomain
      RestApiId: !Ref EidolonApi
      Stage: !Ref ApiStage

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53ZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomain.RegionalHostedZoneId

  # ============================================================
  # WAF WebACL for API Gateway
  # ============================================================
  ApiGatewayWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: EidolonApiGatewayWebACL
      Description: WAF protection for API Gateway REST endpoints
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: EidolonApiGatewayWebACL
      Rules:
        - Name: RateLimitAuthenticated
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                ResponseHeaders:
                  - Name: X-WAF-Block-Reason
                    Value: rate-limit-exceeded
                  - Name: Retry-After
                    Value: "300"
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: CUSTOM_KEYS
              CustomKeys:
                - Header:
                    Name: Authorization
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
              ScopeDownStatement:
                ByteMatchStatement:
                  SearchString: Bearer
                  FieldToMatch:
                    SingleHeader:
                      Name: authorization
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
                  PositionalConstraint: STARTS_WITH
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiRateLimitAuth

        - Name: RateLimitAnonymous
          Priority: 1
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                ResponseHeaders:
                  - Name: X-WAF-Block-Reason
                    Value: rate-limit-exceeded
                  - Name: Retry-After
                    Value: "300"
          Statement:
            RateBasedStatement:
              Limit: 20
              AggregateKeyType: IP
              ScopeDownStatement:
                NotStatement:
                  Statement:
                    ByteMatchStatement:
                      SearchString: Bearer
                      FieldToMatch:
                        SingleHeader:
                          Name: authorization
                      TextTransformations:
                        - Priority: 0
                          Type: NONE
                      PositionalConstraint: STARTS_WITH
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiRateLimitAnon

        - Name: RequestSizeLimit
          Priority: 2
          Action:
            Block: {}
          Statement:
            SizeConstraintStatement:
              FieldToMatch:
                Body: {}
              ComparisonOperator: GT
              Size: 10240
              TextTransformations:
                - Priority: 0
                  Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiRequestSizeBlock

        - Name: AWSManagedRulesCoreRuleSet
          Priority: 3
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiCoreRuleSet

        - Name: AWSManagedRulesIPReputation
          Priority: 4
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiIPReputation
      Tags:
        - Key: System
          Value: eidolon

  ApiWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${EidolonApi}/stages/${ApiStage}"
      WebACLArn: !GetAtt ApiGatewayWebACL.Arn

Outputs:
  RestApiId:
    Description: API Gateway REST API ID
    Value: !Ref EidolonApi

  ApiUrl:
    Description: API Gateway prod stage URL
    Value: !Sub "https://${EidolonApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ApiCustomUrl:
    Description: API custom domain URL
    Value: !Sub "https://${ApiDomainName}"

  StageName:
    Description: API Gateway stage name
    Value: prod
