  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RootOptions
      - ArchetypeOptions
      - ArchetypeGet
      - CharacterOptions
      - CharacterPost
      - CharacterGet
      - CharacterDelete
      - CharacterListOptions
      - CharacterListGet
      - ItemOptions
      - ItemBriefOptions
      - ItemBriefGet
      - ItemPrototypeOptions
      - ItemPrototypeGet
      - ItemConsumeOptions
      - ItemConsumePost
      - ItemDiscardOptions
      - ItemDiscardPost
      - ItemConsolidateOptions
      - ItemConsolidatePost
      - ItemSplitOptions
      - ItemSplitPost
      - ItemEquipOptions
      - ItemEquipPost
      - ItemUnequipOptions
      - ItemUnequipPost
      - ItemMoveOptions
      - ItemMovePost
      - StoreListOptions
      - StoreListGet
      - StorePurchaseOptions
      - StorePurchasePost
      - StoryStartOptions
      - StoryStartPost
      - StoryAbandonOptions
      - StoryAbandonPost
      - StoryHistoryOptions
      - StoryHistoryGet
      - SegmentDecisionOptions
      - SegmentDecisionPost
      - SegmentStatusOptions
      - SegmentStatusGet
      - SegmentHistoryOptions
      - SegmentHistoryGet
    Properties:
      RestApiId: !Ref EidolonApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref EidolonApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      Tags:
        - Key: System
          Value: eidolon

  ApiDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: System
          Value: eidolon

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiDomain
      RestApiId: !Ref EidolonApi
      Stage: !Ref ApiStage

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53ZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomain.RegionalHostedZoneId

  ApiGatewayWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: EidolonApiGatewayWebACL
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: EidolonApiGatewayWebACL
      Rules:
        - Name: RateLimitAuthenticated
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                ResponseHeaders:
                  - Name: X-WAF-Block-Reason
                    Value: rate-limit-exceeded
                  - Name: Retry-After
                    Value: "300"
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: CUSTOM_KEYS
              CustomKeys:
                - Header:
                    Name: Authorization
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
              ScopeDownStatement:
                ByteMatchStatement:
                  SearchString: Bearer
                  FieldToMatch:
                    SingleHeader:
                      Name: authorization
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
                  PositionalConstraint: STARTS_WITH
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiRateLimitAuth

        - Name: RateLimitAnonymous
          Priority: 1
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                ResponseHeaders:
                  - Name: X-WAF-Block-Reason
                    Value: rate-limit-exceeded
                  - Name: Retry-After
                    Value: "300"
          Statement:
            RateBasedStatement:
              Limit: 20
              AggregateKeyType: IP
              ScopeDownStatement:
                NotStatement:
                  Statement:
                    ByteMatchStatement:
                      SearchString: Bearer
                      FieldToMatch:
                        SingleHeader:
                          Name: authorization
                      TextTransformations:
                        - Priority: 0
                          Type: NONE
                      PositionalConstraint: STARTS_WITH
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiRateLimitAnon

        - Name: RequestSizeLimit
          Priority: 2
          Action:
            Block: {}
          Statement:
            SizeConstraintStatement:
              FieldToMatch:
                Body: {}
              ComparisonOperator: GT
              Size: 10240
              TextTransformations:
                - Priority: 0
                  Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: ApiRequestSizeBlock

      Tags:
        - Key: System
          Value: eidolon

  ApiWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${EidolonApi}/stages/${ApiStage}"
      WebACLArn: !GetAtt ApiGatewayWebACL.Arn

Outputs:
  RestApiId:
    Value: !Ref EidolonApi

