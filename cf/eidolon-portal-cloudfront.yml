AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFront distribution for Eidolon portal with S3 origin, WAF, and Route53

Parameters:
  ClientBucketName:
    Type: String
    Description: S3 bucket name for portal client assets

  PortalCertificateArn:
    Type: String
    Description: ARN of the ACM certificate for the portal domain

  Route53ZoneId:
    Type: String
    Description: Route53 hosted zone ID for DNS records

  ClientDomainName:
    Type: String
    Description: FQDN for portal (e.g. portal.darkrelics.net)

Resources:
  # Origin Access Identity for S3
  PortalOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${ClientBucketName} portal"

  # Bucket policy granting OAI access to portal bucket
  PortalBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ClientBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt PortalOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ClientBucketName}/*"

  # WAF WebACL for CloudFront (must be CLOUDFRONT scope in us-east-1)
  CloudFrontWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: EidolonCloudFrontWebACL
      Description: WAF protection for CloudFront CDN serving web clients
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: EidolonCloudFrontWebACL
      Rules:
        - Name: RateLimitGeneral
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 403
                ResponseHeaders:
                  - Name: X-WAF-Block-Reason
                    Value: rate-limit-exceeded
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CloudFrontRateLimitGeneral
      Tags:
        - Key: System
          Value: eidolon

  # CloudFront Distribution
  PortalDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref ClientDomainName
        WebACLId: !GetAtt CloudFrontWebACL.Arn
        Origins:
          - Id: S3Origin
            DomainName: !Sub "${ClientBucketName}.s3.${AWS::Region}.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${PortalOAI}"
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
        ViewerCertificate:
          AcmCertificateArn: !Ref PortalCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
      Tags:
        - Key: System
          Value: eidolon

  # Route53 A record for portal domain
  PortalDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref Route53ZoneId
      Name: !Ref ClientDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt PortalDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  DistributionId:
    Description: CloudFront distribution ID
    Value: !Ref PortalDistribution

  DistributionDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt PortalDistribution.DomainName

  PortalUrl:
    Description: Portal URL
    Value: !Sub "https://${ClientDomainName}"
