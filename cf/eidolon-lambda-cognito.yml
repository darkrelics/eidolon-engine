AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda functions for Cognito triggers

Parameters:
  S3BucketName:
    Type: String
    Description: S3 bucket containing Lambda deployment packages

  LambdaLayerArn:
    Type: String
    Description: ARN of the Lambda dependencies layer

  LambdaExecutionRoleArn:
    Type: String
    Description: ARN of the Lambda execution role

  AllowedOrigins:
    Type: String
    Description: Allowed CORS origins

Resources:
  CognitoPlayerNewFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cognito-player-new
      Description: Eidolon Engine Cognito post-confirmation trigger
      Runtime: python3.12
      Handler: cognito_player_new.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !Ref LambdaExecutionRoleArn
      Layers:
        - !Ref LambdaLayerArn
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: cognito-player-new.zip
      Environment:
        Variables:
          APPLICATION_NAME: eidolon-engine
          LOG_LEVEL: INFO
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          CORS_ALLOW_CREDENTIALS: "true"
          CORS_ALLOW_HEADERS: Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token
          CORS_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS
          CORS_MAX_AGE: "86400"
          players_table: players
          characters_table: characters
      Tags:
        - Key: System
          Value: eidolon

  CognitoPlayerDeleteFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cognito-player-delete
      Description: Eidolon Engine Cognito player deletion handler
      Runtime: python3.12
      Handler: cognito_player_delete.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !Ref LambdaExecutionRoleArn
      Layers:
        - !Ref LambdaLayerArn
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: cognito-player-delete.zip
      Environment:
        Variables:
          APPLICATION_NAME: eidolon-engine
          LOG_LEVEL: INFO
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          CORS_ALLOW_CREDENTIALS: "true"
          CORS_ALLOW_HEADERS: Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token
          CORS_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS
          CORS_MAX_AGE: "86400"
          players_table: players
          characters_table: characters
      Tags:
        - Key: System
          Value: eidolon

Outputs:
  CognitoPlayerNewArn:
    Description: ARN of the cognito-player-new function
    Value: !GetAtt CognitoPlayerNewFunction.Arn

  CognitoPlayerDeleteArn:
    Description: ARN of the cognito-player-delete function
    Value: !GetAtt CognitoPlayerDeleteFunction.Arn
