AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda functions for character, item, and store API endpoints

Parameters:
  S3BucketName:
    Type: String
    Description: S3 bucket containing Lambda deployment packages

  LambdaLayerArn:
    Type: String
    Description: ARN of the Lambda dependencies layer

  LambdaExecutionRoleArn:
    Type: String
    Description: ARN of the Lambda execution role

  AllowedOrigins:
    Type: String
    Description: Allowed CORS origins

Resources:
  ApiCharacterAddFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: api-character-add
      Description: Create a new character
      Runtime: python3.12
      Handler: api_character_add.lambda_handler
      MemorySize: 128
      Timeout: 30
      Role: !Ref LambdaExecutionRoleArn
      Layers:
        - !Ref LambdaLayerArn
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: api-character-add.zip
      Environment:
        Variables:
          APPLICATION_NAME: eidolon-engine
          LOG_LEVEL: INFO
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          CORS_ALLOW_CREDENTIALS: "true"
          CORS_ALLOW_HEADERS: Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token
          CORS_ALLOW_METHODS: GET,POST,PUT,DELETE,OPTIONS
          CORS_MAX_AGE: "86400"
          players_table: players
          characters_table: characters
          archetypes_table: archetypes
          items_table: items
          prototypes_table: prototypes
      Tags:
        - Key: System
          Value: eidolon

  ApiCharacterDeleteFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: api-character-delete
