AWSTemplateFormatVersion: "2010-09-09"
Description: Cognito User Pool, Client, and Identity Pool for Eidolon Engine

Parameters:
  PostConfirmationLambdaArn:
    Type: String
    Description: ARN of the post-confirmation Lambda trigger

  AllowedOrigins:
    Type: String
    Description: Allowed CORS callback URL for OAuth

  ScriptsBucketName:
    Type: String
    Description: S3 bucket for game scripts (story images)
    Default: ""

Conditions:
  HasScriptsBucket: !Not
    - !Equals
      - !Ref ScriptsBucketName
      - ""

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: eidolon-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      LambdaConfig:
        PostConfirmation: !Ref PostConfirmationLambdaArn
      UserPoolTags:
        System: eidolon

  PostConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationLambdaArn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: eidolon-web-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - implicit
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - profile
        - phone
        - email
        - openid
        - aws.cognito.signin.user.admin
      CallbackURLs:
        - !Ref AllowedOrigins
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 43200
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: minutes

  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: eidolon-identity-pool
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref UserPoolClient
          ProviderName: !GetAtt UserPool.ProviderName

  AuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eidolon-cognito-authenticated-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - !If
          - HasScriptsBucket
          - PolicyName: eidolon-scripts-read-policy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                  Resource:
                    - !Sub "arn:aws:s3:::${ScriptsBucketName}/stories/*"
                    - !Sub "arn:aws:s3:::${ScriptsBucketName}/images/*"
          - !Ref AWS::NoValue
      Tags:
        - Key: System
          Value: eidolon

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        authenticated: !GetAtt AuthenticatedRole.Arn

  # WAF WebACL for Cognito User Pool
  CognitoWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: EidolonCognitoWebACL
      Description: WAF protection for Cognito endpoints
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: EidolonCognitoWebACL
      Rules:
        - Name: RateLimitCognitoAPI
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 403
                ResponseHeaders:
                  - Name: X-WAF-Block-Reason
                    Value: auth-rate-limit-exceeded
                  - Name: Retry-After
                    Value: "900"
          Statement:
            RateBasedStatement:
              Limit: 20
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CognitoRateLimit
        - Name: AWSManagedRulesIPReputation
          Priority: 1
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CognitoIPReputation
      Tags:
        - Key: System
          Value: eidolon

  CognitoWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt UserPool.Arn
      WebACLArn: !GetAtt CognitoWebACL.Arn

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !Ref IdentityPool
