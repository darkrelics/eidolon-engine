name: Go Test

on:
  push:
    branches: [develop, qa, prod]
    paths:
      - "server/**"
  pull_request:
    paths:
      - "server/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run tests
        run: |
          cd server
          go mod tidy
          go test -v -race ./...
