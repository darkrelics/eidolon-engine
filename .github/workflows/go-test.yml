name: Go Test

on:
  push:
    branches: [develop, qa, prod]
  pull_request:
    branches: "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Run tests
        run: |
          cd server
          go mod tidy
          go test -v -race ./...
