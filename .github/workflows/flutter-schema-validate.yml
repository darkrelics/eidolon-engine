name: Flutter JSON Schema Validation

on:
  push:
    branches: [develop, qa, prod]
    paths:
      - "scripts/generate_jsonschemas.py"
      - "incremental/**"
      - "portal/**"
  pull_request:
    paths:
      - "scripts/generate_jsonschemas.py"
      - "incremental/**"
      - "portal/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/lambda-requirements.txt

      - name: Generate JSON Schemas
        run: PYTHONPATH=$GITHUB_WORKSPACE python scripts/generate_jsonschemas.py

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Flutter pub get
        working-directory: incremental
        run: flutter pub get

      - name: Run Flutter tests (schema validation)
        working-directory: incremental
        run: flutter test test/schema_validation_test.dart
