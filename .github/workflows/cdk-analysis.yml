name: CDK Security Analysis

on:
  push:
    branches: [develop, qa, prod]
    paths:
      - "deployment/**/*.py"
  pull_request:
    branches: "**"
    paths:
      - "deployment/**/*.py"

permissions:
  pull-requests: read
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      # CRITICAL TESTS - Must pass for build to succeed
      - name: Scan CDK with Checkov (Critical)
        continue-on-error: true
        id: checkov_critical
        run: |
          checkov -d deployment/ \
            --framework cloudformation \
            --check CRITICAL \
            --compact \
            --quiet

      - name: Scan CDK with Checkov (High Severity)
        continue-on-error: true
        id: checkov_high
        run: |
          checkov -d deployment/ \
            --framework cloudformation \
            --check HIGH \
            --compact \
            --quiet

      # COMPREHENSIVE EVALUATION - Informational only
      - name: Scan CDK with Checkov (Full Report)
        continue-on-error: true
        id: checkov_full
        run: |
          checkov -d deployment/ \
            --framework cloudformation \
            --compact \
            --exit-zero

      - name: Check for critical failures
        if: always()
        run: |
          if [[ ${{ steps.checkov_critical.outcome }} != 'success' ]] || \
             [[ ${{ steps.checkov_high.outcome }} != 'success' ]]; then
            echo "One or more critical security checks failed"
            exit 1
          else
            echo "All critical security checks passed"
          fi

      - name: Generate Analysis Summary
        if: always()
        run: |
          echo "## CDK Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Critical Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Checkov Critical: ${{ steps.checkov_critical.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Checkov High: ${{ steps.checkov_high.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "### Comprehensive Evaluation" >> $GITHUB_STEP_SUMMARY
          echo "- Checkov Full Scan: ${{ steps.checkov_full.outcome }}" >> $GITHUB_STEP_SUMMARY
