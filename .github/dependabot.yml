version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "robinje"

  - package-ecosystem: "gomod"
    directory: "/server"
    schedule:
      interval: "weekly"
    reviewers:
      - "robinje"

  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    reviewers:
      - "robinje"

  - package-ecosystem: "pub"
    directory: "/portal"
