<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="An incremental RPG game introducing players to the Eidolon Engine world" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Eidolon Incremental" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Eidolon Incremental</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      body {
        background-color: #1f2224;
        margin: 0;
        padding: 0;
      }
    </style>
    
    <script>
      // Configure Flutter web renderer to avoid WebGL deprecation warnings
      // Options: "canvaskit", "html", or "auto"
      // CanvasKit provides better performance and consistency across browsers
      window.flutterWebRenderer = "canvaskit";
      
      // Fix for password field warning in Flutter Web
      // Flutter creates hidden input elements that aren't wrapped in forms
      // This observer wraps any password inputs in forms to satisfy browser security
      window.addEventListener('DOMContentLoaded', function() {
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
              if (node.nodeType === 1 && node.tagName === 'INPUT' && 
                  node.type === 'password' && !node.closest('form')) {
                // Create a form wrapper for the password input
                const form = document.createElement('form');
                form.style.display = 'contents';
                form.setAttribute('autocomplete', 'on');
                form.setAttribute('onsubmit', 'return false;');
                
                // Wrap the input in the form
                node.parentNode.insertBefore(form, node);
                form.appendChild(node);
              }
            });
          });
        });
        
        // Start observing the body for dynamically added elements
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      });
    </script>
  </head>
  <body>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
