<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Eidolon Engine" />

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Eidolon Engine" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Eidolon Engine</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      body {
        background-color: black;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .loading {
        color: white;
        font-family: Arial, sans-serif;
        font-size: 24px;
        text-align: center;
      }
    </style>

    <script>
      window._flutter = {
        buildConfig: {
          locale: "en",
          serviceWorkerVersion: null,
        },
      };
    </script>
    <script src="flutter.js" defer></script>
  </head>
  <body>
    <div id="loading" class="loading">Entering Eidolon...</div>
    <script>
      window.addEventListener("load", function () {
        const loading = document.querySelector("#loading");

        _flutter.loader
          .loadEntrypoint({
            serviceWorker: {
              serviceWorkerVersion: null,
            },
            onEntrypointLoaded: async function (engineInitializer) {
              loading.textContent = "Initializing Eidolon Engine...";
              const appRunner = await engineInitializer.initializeEngine();
              loading.remove();
              await appRunner.runApp();
            },
          })
          .catch(function (error) {
            loading.textContent = "Error initializing Eidolon Engine: " + error;
            console.error("Flutter initialization error:", error);
          });
      });
    </script>
  </body>
</html>
