AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda functions and API Gateway for Eidolon Engine"

Parameters:
  GameName:
    Type: String
    Default: "eidolon"
    Description: "Name of the game"
  LambdaBucketName:
    Type: String
    Description: "S3 bucket containing Lambda deployment packages"
  LambdaZipKey:
    Type: String
    Default: "lambda.zip"
    Description: "S3 key for Lambda deployment package"
  LayerZipKey:
    Type: String
    Default: "layer.zip"
    Description: "S3 key for Lambda layer package"
  CognitoUserPoolId:
    Type: String
    Description: "Cognito User Pool ID for authentication"
  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain name for API (optional)"
  CertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN for custom domain (optional)"

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # Lambda Layer for dependencies
  BaseLambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${GameName}-base-layer"
      Description: "Base dependencies for Lambda functions"
      Content:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LayerZipKey
      CompatibleRuntimes:
        - python3.12

  # API Gateway
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${GameName}-api"
      Description: !Sub "API Gateway for ${GameName}"
      EndpointConfiguration:
        Types:
          - REGIONAL

  # Cognito Authorizer
  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub "${GameName}-cognito-authorizer"
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      RestApiId: !Ref ApiGateway
      ProviderARNs:
        - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"

  # Lambda Functions
  GetArchetypesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-get-archetypes"
      Runtime: python3.12
      Handler: api_archetypes_get.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          ARCHETYPES_TABLE: archetypes
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  AddCharacterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-add-character"
      Runtime: python3.12
      Handler: api_character_add.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          PLAYERS_TABLE: players
          CHARACTERS_TABLE: characters
          ARCHETYPES_TABLE: archetypes
          DEFAULT_HEALTH: "10"
          DEFAULT_ESSENCE: "3"
          MAX_CHARACTERS_PER_PLAYER: "10"
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  GetCharacterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-get-character"
      Runtime: python3.12
      Handler: api_character_get.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
          STORY_TABLE: story
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  ListCharactersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-list-characters"
      Runtime: python3.12
      Handler: api_character_list.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  DeleteCharacterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-character-delete"
      Runtime: python3.12
      Handler: api_character_delete.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  # Story Lambda Functions (new)
  GetStoryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-get-story"
      Runtime: python3.12
      Handler: api_get_story.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
          STORY_DEFINITIONS_TABLE: story_definitions
          STORY_TABLE: story
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  StartStoryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-api-start-story"
      Runtime: python3.12
      Handler: api_start_story.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
          STORY_TABLE: story
          SEGMENTS_TABLE: segments
          ACTIVE_SEGMENTS_TABLE: active_segments
          OPPONENTS_TABLE: opponents
          SEGMENT_PROCESSOR_FUNCTION_ARN: !GetAtt ProcessSegmentFunction.Arn
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  ProcessSegmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-process-segment"
      Runtime: python3.12
      Handler: process_segment.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
          STORY_TABLE: story
          SEGMENTS_TABLE: segments
          ACTIVE_SEGMENTS_TABLE: active_segments
          OPPONENTS_TABLE: opponents
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  # Ops Lambda Functions
  OpsSegmentPollerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-ops-segment-poller"
      Runtime: python3.12
      Handler: ops_segment_poller.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          SEGMENTS_TABLE: segments
          ACTIVE_SEGMENTS_TABLE: active_segments
          MAX_SEGMENTS_PER_POLL: "50"
          SSM_POLLER_STATE_PARAMETER: !Sub "/${GameName}/segment-poller-state"
          SEGMENT_QUEUE_URL: !ImportValue
            Fn::Sub: "sqs-${AWS::StackName}-SegmentQueueUrl"
      MemorySize: 256
      Timeout: 60
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaSSMSQSExecutionRoleArn"

  OpsProcessSegmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-ops-process-segment"
      Runtime: python3.12
      Handler: ops_process_segment.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Layers:
        - !Ref BaseLambdaLayer
      Environment:
        Variables:
          CHARACTERS_TABLE: characters
          STORY_TABLE: story
          SEGMENTS_TABLE: segments
          ACTIVE_SEGMENTS_TABLE: active_segments
          OPPONENTS_TABLE: opponents
          SSM_POLLER_STATE_PARAMETER: !Sub "/${GameName}/segment-poller-state"
      MemorySize: 256
      Timeout: 60
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaSSMSQSExecutionRoleArn"
      ReservedConcurrentExecutions: 5

  # SQS Event Source Mapping for Process Segment
  ProcessSegmentEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !ImportValue
        Fn::Sub: "sqs-${AWS::StackName}-SegmentQueueArn"
      FunctionName: !Ref OpsProcessSegmentFunction
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # API Resources and Methods
  ArchetypesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: archetypes

  ArchetypesMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ArchetypesResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetArchetypesFunction.Arn}/invocations"

  CharactersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: characters

  CharactersGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref CharactersResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListCharactersFunction.Arn}/invocations"

  CharactersPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref CharactersResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AddCharacterFunction.Arn}/invocations"

  CharacterIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref CharactersResource
      PathPart: "{characterId}"

  CharacterIdGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref CharacterIdResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      RequestParameters:
        method.request.path.characterId: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetCharacterFunction.Arn}/invocations"

  CharacterIdDeleteMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref CharacterIdResource
      HttpMethod: DELETE
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      RequestParameters:
        method.request.path.characterId: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteCharacterFunction.Arn}/invocations"

  # Story API Resources (new)
  StoryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: story

  StoryGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref StoryResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetStoryFunction.Arn}/invocations"

  StartResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref StoryResource
      PathPart: start

  StartPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref StartResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${StartStoryFunction.Arn}/invocations"

  # API Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ArchetypesMethod
      - CharactersGetMethod
      - CharactersPostMethod
      - CharacterIdGetMethod
      - CharacterIdDeleteMethod
      - StoryGetMethod
      - StartPostMethod
    Properties:
      RestApiId: !Ref ApiGateway
      StageName: prod
      StageDescription:
        MethodSettings:
          - HttpMethod: "*"
            ResourcePath: "/*"
            LoggingLevel: ERROR
            DataTraceEnabled: true
            MetricsEnabled: true

  # Lambda Permissions for API Gateway
  GetArchetypesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetArchetypesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  AddCharacterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AddCharacterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  GetCharacterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetCharacterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  ListCharactersPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ListCharactersFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  DeleteCharacterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DeleteCharacterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  GetStoryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetStoryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  StartStoryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StartStoryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

  # EventBridge Rule for Segment Processing
  SegmentProcessorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessSegmentFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com

  # Custom Domain (optional)
  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  CustomDomainMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref CustomDomain
      RestApiId: !Ref ApiGateway
      Stage: prod

Outputs:
  ApiGatewayUrl:
    Description: "URL of the API Gateway"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${AWS::StackName}-ApiGatewayUrl"

  ApiGatewayId:
    Description: "ID of the API Gateway"
    Value: !Ref ApiGateway
    Export:
      Name: !Sub "${AWS::StackName}-ApiGatewayId"

  ProcessSegmentFunctionArn:
    Description: "ARN of the process segment Lambda function"
    Value: !GetAtt ProcessSegmentFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ProcessSegmentFunctionArn"
