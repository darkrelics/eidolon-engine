AWSTemplateFormatVersion: "2010-09-09"
Description: "Master template for Eidolon Engine infrastructure"

Parameters:
  GameName:
    Type: String
    Default: "eidolon"
    Description: "Name of the game"
  ReplyEmailAddress:
    Type: String
    Description: "Email address for Cognito notifications"
    Default: "noreply@example.com"
  LambdaBucketName:
    Type: String
    Description: "S3 bucket containing Lambda deployment packages"
  LambdaZipKey:
    Type: String
    Default: "lambda.zip"
    Description: "S3 key for Lambda deployment package"
  LayerZipKey:
    Type: String
    Default: "layer.zip"
    Description: "S3 key for Lambda layer package"
  PortalDomainName:
    Type: String
    Default: ""
    Description: "Custom domain for portal (optional)"
  ApiDomainName:
    Type: String
    Default: ""
    Description: "Custom domain for API (optional)"
  CertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN for custom domains (optional)"
  CloudWatchRetentionDays:
    Type: Number
    Default: 365
    Description: "CloudWatch log retention in days"

Resources:
  # IAM roles must be created first
  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: "./iam.yml"
      Parameters:
        GameName: !Ref GameName
      Tags:
        - Key: Component
          Value: IAM

  # CloudWatch logging
  CloudWatchStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: "./cloudwatch.yml"
      Parameters:
        GameName: !Ref GameName
        RetentionInDays: !Ref CloudWatchRetentionDays
      Tags:
        - Key: Component
          Value: CloudWatch

  # S3 buckets
  S3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: "./s3.yml"
      Parameters:
        GameName: !Ref GameName
      Tags:
        - Key: Component
          Value: S3

  # DynamoDB tables
  DynamoDBStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - IAMStack
    Properties:
      TemplateURL: "./dynamo.yml"
      Parameters:
        GameName: !Ref GameName
      Tags:
        - Key: Component
          Value: DynamoDB

  # Attach DynamoDB policy to roles
  AttachDynamoDBPolicyToServer:
    Type: AWS::IAM::RolePolicyAttachment
    Properties:
      RoleName: !GetAtt IAMStack.Outputs.ServerExecutionRoleName
      PolicyArn: !GetAtt DynamoDBStack.Outputs.DynamoDBAccessPolicyArn

  AttachDynamoDBPolicyToLambda:
    Type: AWS::IAM::RolePolicyAttachment
    Properties:
      RoleName: !GetAtt IAMStack.Outputs.LambdaExecutionRoleName
      PolicyArn: !GetAtt DynamoDBStack.Outputs.DynamoDBAccessPolicyArn

  AttachCloudWatchPolicyToServer:
    Type: AWS::IAM::RolePolicyAttachment
    Properties:
      RoleName: !GetAtt IAMStack.Outputs.ServerExecutionRoleName
      PolicyArn: !GetAtt CloudWatchStack.Outputs.CloudWatchPolicyArn

  # Cognito with Lambda triggers
  CognitoStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - IAMStack
      - S3Stack
    Properties:
      TemplateURL: "./cognito.yml"
      Parameters:
        GameName: !Ref GameName
        ReplyEmailAddress: !Ref ReplyEmailAddress
        LambdaBucketName: !Ref LambdaBucketName
        LambdaZipKey: !Ref LambdaZipKey
      Tags:
        - Key: Component
          Value: Cognito

  # Lambda functions and API Gateway
  LambdaStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - IAMStack
      - DynamoDBStack
      - CognitoStack
    Properties:
      TemplateURL: "./lambda.yml"
      Parameters:
        GameName: !Ref GameName
        LambdaBucketName: !Ref LambdaBucketName
        LambdaZipKey: !Ref LambdaZipKey
        LayerZipKey: !Ref LayerZipKey
        CognitoUserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        DomainName: !Ref ApiDomainName
        CertificateArn: !Ref CertificateArn
      Tags:
        - Key: Component
          Value: Lambda

  # CloudFront distribution
  CloudFrontStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - S3Stack
    Properties:
      TemplateURL: "./cloudfront.yml"
      Parameters:
        GameName: !Ref GameName
        DomainName: !Ref PortalDomainName
        CertificateArn: !Ref CertificateArn
      Tags:
        - Key: Component
          Value: CloudFront

  # CodeBuild for deployments
  CodeBuildStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - S3Stack
      - CognitoStack
    Properties:
      TemplateURL: "./codebuild.yml"
      Parameters:
        GameName: !Ref GameName
        CognitoUserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        CognitoUserPoolClientId: !GetAtt CognitoStack.Outputs.UserPoolClientId
        CognitoIdentityPoolId: !GetAtt CognitoStack.Outputs.IdentityPoolId
        ApiUrl: !GetAtt LambdaStack.Outputs.ApiGatewayUrl
      Tags:
        - Key: Component
          Value: CodeBuild

Outputs:
  # S3 Buckets
  PortalBucketName:
    Description: "S3 bucket for portal files"
    Value: !GetAtt S3Stack.Outputs.PortalBucketName

  ScriptsBucketName:
    Description: "S3 bucket for scripts"
    Value: !GetAtt S3Stack.Outputs.ScriptsBucketName

  LambdaBucketName:
    Description: "S3 bucket for Lambda packages"
    Value: !GetAtt S3Stack.Outputs.LambdaBucketName

  # CloudFront
  CloudFrontDistributionId:
    Description: "CloudFront distribution ID"
    Value: !GetAtt CloudFrontStack.Outputs.CloudFrontDistributionId

  CloudFrontDistributionDomainName:
    Description: "CloudFront distribution domain"
    Value: !GetAtt CloudFrontStack.Outputs.CloudFrontDistributionDomainName

  # API Gateway
  ApiGatewayUrl:
    Description: "API Gateway URL"
    Value: !GetAtt LambdaStack.Outputs.ApiGatewayUrl

  # Cognito
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !GetAtt CognitoStack.Outputs.UserPoolId

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !GetAtt CognitoStack.Outputs.UserPoolClientId

  IdentityPoolId:
    Description: "Cognito Identity Pool ID"
    Value: !GetAtt CognitoStack.Outputs.IdentityPoolId

  # DynamoDB Tables
  PlayersTableName:
    Description: "Players table name"
    Value: !GetAtt DynamoDBStack.Outputs.PlayersTableName

  CharactersTableName:
    Description: "Characters table name"
    Value: !GetAtt DynamoDBStack.Outputs.CharactersTableName

  StoryTableName:
    Description: "Story table name"
    Value: !GetAtt DynamoDBStack.Outputs.StoryTableName

  StoryDefinitionsTableName:
    Description: "Story definitions table name"
    Value: !GetAtt DynamoDBStack.Outputs.StoryDefinitionsTableName

  # IAM Roles
  ServerExecutionRoleArn:
    Description: "Server execution role ARN"
    Value: !GetAtt IAMStack.Outputs.ServerExecutionRoleArn

  LambdaExecutionRoleArn:
    Description: "Lambda execution role ARN"
    Value: !GetAtt IAMStack.Outputs.LambdaExecutionRoleArn

  # CloudWatch
  LogGroupName:
    Description: "CloudWatch log group name"
    Value: !GetAtt CloudWatchStack.Outputs.LogGroupName

  # CodeBuild
  CodeBuildProjectName:
    Description: "CodeBuild project name"
    Value: !GetAtt CodeBuildStack.Outputs.CodeBuildProjectName
