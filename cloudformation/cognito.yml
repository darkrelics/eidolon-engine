AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cognito User Pool and Client for Eidolon Engine'

Parameters:
  UserPoolName:
    Type: String
    Default: EidolonEngineUserPool
    Description: Name of the Cognito User Pool
  
  ClientAppName:
    Type: String
    Default: EidolonEngineWebApp
    Description: Name of the Cognito App Client

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Ref ClientAppName
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO
      AuthSessionValidity: 3
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

Outputs:
  UserPoolId:
    Value: !Ref CognitoUserPool
    Description: ID of the Cognito User Pool
    Export:
      Name: EidolonEngine-UserPoolId

  UserPoolClientId:
    Value: !Ref CognitoUserPoolClient
    Description: ID of the Cognito App Client
    Export:
      Name: EidolonEngine-ClientId

  UserPoolArn:
    Value: !GetAtt CognitoUserPool.Arn
    Description: ARN of the Cognito User Pool
    Export:
      Name: EidolonEngine-UserPoolArn