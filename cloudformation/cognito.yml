AWSTemplateFormatVersion: "2010-09-09"
Description: "Cognito User Pool, Client, and Identity Pool for Eidolon Engine"

Parameters:
  GameName:
    Type: String
    Default: "eidolon"
    Description: "Name of the game"

  ReplyEmailAddress:
    Type: String
    Description: "Email address to send notifications from"
    Default: "noreply@darkrelics.net"

  LambdaBucketName:
    Type: String
    Description: "S3 bucket containing Lambda deployment packages"

  LambdaZipKey:
    Type: String
    Default: "lambda.zip"
    Description: "S3 key for Lambda deployment package"

Resources:
  # Lambda functions for Cognito triggers
  CognitoNewPlayerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-cognito-new-player"
      Runtime: python3.12
      Handler: cognito_new_player.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Environment:
        Variables:
          PLAYERS_TABLE: players
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  CognitoDeletePlayerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${GameName}-cognito-delete-player"
      Runtime: python3.12
      Handler: cognito_delete_player.lambda_handler
      Code:
        S3Bucket: !Ref LambdaBucketName
        S3Key: !Ref LambdaZipKey
      Environment:
        Variables:
          PLAYERS_TABLE: players
          CHARACTERS_TABLE: characters
      MemorySize: 128
      Timeout: 30
      Role: !ImportValue
        Fn::Sub: "iam-${AWS::StackName}-LambdaExecutionRoleArn"

  # Lambda permissions for Cognito triggers
  CognitoNewPlayerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CognitoNewPlayerFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoDeletePlayerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CognitoDeletePlayerFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${GameName}-user-pool"
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
        ReplyToEmailAddress: !Ref ReplyEmailAddress
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      LambdaConfig:
        PostConfirmation: !GetAtt CognitoNewPlayerFunction.Arn

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${GameName}-web-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO
      AuthSessionValidity: 3
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "${GameName}-identity-pool"
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClient
          ProviderName: !GetAtt CognitoUserPool.ProviderName

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${GameName}-authenticated-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${GameName}-scripts/stories/*"
                  - !Sub "arn:aws:s3:::${GameName}-scripts/images/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${GameName}-scripts"
                Condition:
                  StringLike:
                    s3:prefix:
                      - "stories/*"
                      - "images/*"

Outputs:
  UserPoolId:
    Description: "ID of the Cognito User Pool"
    Value: !Ref CognitoUserPool

  UserPoolArn:
    Description: "ARN of the Cognito User Pool"
    Value: !GetAtt CognitoUserPool.Arn

  UserPoolClientId:
    Description: "ID of the Cognito App Client"
    Value: !Ref CognitoUserPoolClient

  IdentityPoolId:
    Description: "ID of the Cognito Identity Pool"
    Value: !Ref CognitoIdentityPool

  AuthenticatedRoleArn:
    Description: "ARN of the authenticated IAM role"
    Value: !GetAtt CognitoAuthenticatedRole.Arn
