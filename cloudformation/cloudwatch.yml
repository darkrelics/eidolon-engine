AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudWatch logging and monitoring for Eidolon Engine"

Parameters:
  GameName:
    Type: String
    Default: "eidolon"
    Description: "Name of the game"
  RetentionInDays:
    Type: Number
    Description: "Number of days to retain logs in CloudWatch"
    Default: 365
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653

Resources:
  ServerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/eidolon/${GameName}/server"
      RetentionInDays: !Ref RetentionInDays

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GameName}"
      RetentionInDays: 7 # Lambda logs are more verbose, shorter retention

  CodeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${GameName}"
      RetentionInDays: 30 # Build logs for troubleshooting

  CloudWatchPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${GameName}-cloudwatch-access"
      Description: "Allows writing to CloudWatch Logs and Metrics"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !GetAtt ServerLogGroup.Arn
              - !Sub "${ServerLogGroup.Arn}:*"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
            Condition:
              StringEquals:
                "cloudwatch:namespace": !Sub "eidolon/${GameName}/metrics"

Outputs:
  LogGroupName:
    Description: "Name of the server CloudWatch Log Group"
    Value: !Ref ServerLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-ServerLogGroupName"

  LambdaLogGroupName:
    Description: "Name of the Lambda CloudWatch Log Group"
    Value: !Ref LambdaLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-LambdaLogGroupName"

  CodeBuildLogGroupName:
    Description: "Name of the CodeBuild CloudWatch Log Group"
    Value: !Ref CodeBuildLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-CodeBuildLogGroupName"

  MetricNamespace:
    Description: "Namespace for CloudWatch Metrics"
    Value: !Sub "eidolon/${GameName}/metrics"
    Export:
      Name: !Sub "${AWS::StackName}-MetricNamespace"

  CloudWatchPolicyArn:
    Description: "ARN of the IAM Managed Policy for CloudWatch access"
    Value: !Ref CloudWatchPolicy
    Export:
      Name: !Sub "${AWS::StackName}-CloudWatchPolicyArn"
