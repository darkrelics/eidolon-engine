AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFormation template for CloudWatch Log Group, Metrics, and IAM Policy"

Parameters:
  LogGroupName:
    Type: String
    Description: Name for the CloudWatch Log Group
    Default: "/eidolon/system"

  MetricNamespace:
    Type: String
    Description: Namespace for CloudWatch Metrics
    Default: "eidolon/system"

  RetentionInDays:
    Type: Number
    Description: Number of days to retain logs in CloudWatch
    Default: 30

Resources:
  EidolonLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: !Ref RetentionInDays

  EidolonCloudWatchPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allows writing to CloudWatch Logs and Metrics
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt EidolonLogGroup.Arn
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: "*"
            Condition:
              StringEquals:
                "cloudwatch:namespace": !Ref MetricNamespace

Outputs:
  LogGroupName:
    Description: Name of the created CloudWatch Log Group
    Value: !Ref EidolonLogGroup

  MetricNamespace:
    Description: Namespace for CloudWatch Metrics
    Value: !Ref MetricNamespace

  CloudWatchPolicyArn:
    Description: ARN of the IAM Managed Policy for CloudWatch access
    Value: !Ref EidolonCloudWatchPolicy
