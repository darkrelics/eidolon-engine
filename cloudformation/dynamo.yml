AWSTemplateFormatVersion: "2010-09-09"
Description: "DynamoDB tables for Eidolon Engine"

Resources:
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: players
      AttributeDefinitions:
        - AttributeName: PlayerID
          AttributeType: S
      KeySchema:
        - AttributeName: PlayerID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CharactersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: characters
      AttributeDefinitions:
        - AttributeName: CharacterID
          AttributeType: S
      KeySchema:
        - AttributeName: CharacterID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  RoomsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rooms
      AttributeDefinitions:
        - AttributeName: RoomID
          AttributeType: N
      KeySchema:
        - AttributeName: RoomID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ExitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: exits
      AttributeDefinitions:
        - AttributeName: ExitID
          AttributeType: S
      KeySchema:
        - AttributeName: ExitID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: items
      AttributeDefinitions:
        - AttributeName: ItemID
          AttributeType: S
      KeySchema:
        - AttributeName: ItemID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ItemPrototypesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: prototypes
      AttributeDefinitions:
        - AttributeName: PrototypeID
          AttributeType: S
      KeySchema:
        - AttributeName: PrototypeID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ArchetypesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: archetypes
      AttributeDefinitions:
        - AttributeName: ArchetypeName
          AttributeType: S
      KeySchema:
        - AttributeName: ArchetypeName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  MOTDTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: motd
      AttributeDefinitions:
        - AttributeName: MotdID
          AttributeType: S
      KeySchema:
        - AttributeName: MotdID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # Incremental Game Tables
  IncrementalCharactersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: incremental_characters
      AttributeDefinitions:
        - AttributeName: PlayerID
          AttributeType: S
      KeySchema:
        - AttributeName: PlayerID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ActiveSegmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: active_segments
      AttributeDefinitions:
        - AttributeName: PlayerID
          AttributeType: S
      KeySchema:
        - AttributeName: PlayerID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  StoryRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: story_registry
      AttributeDefinitions:
        - AttributeName: StoryID
          AttributeType: S
        - AttributeName: Version
          AttributeType: N
      KeySchema:
        - AttributeName: StoryID
          KeyType: HASH
        - AttributeName: Version
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  StoryManifestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: story_manifest
      AttributeDefinitions:
        - AttributeName: ManifestType
          AttributeType: S
        - AttributeName: StoryID
          AttributeType: S
      KeySchema:
        - AttributeName: ManifestType
          KeyType: HASH
        - AttributeName: StoryID
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  CharacterHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: character_history
      AttributeDefinitions:
        - AttributeName: PlayerID
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: PlayerID
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  EidolonDynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EidolonDynamoDBReadWritePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/players"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/characters"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/rooms"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/exits"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/items"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/prototypes"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/archetypes"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/motd"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/incremental_characters"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/active_segments"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/story_registry"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/story_manifest"
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/character_history"

Outputs:
  PlayersTableArn:
    Description: "ARN of the Players table"
    Value: !GetAtt PlayersTable.Arn

  CharactersTableArn:
    Description: "ARN of the Characters table"
    Value: !GetAtt CharactersTable.Arn

  RoomsTableArn:
    Description: "ARN of the Rooms table"
    Value: !GetAtt RoomsTable.Arn

  ExitsTableArn:
    Description: "ARN of the Exits table"
    Value: !GetAtt ExitsTable.Arn

  ItemsTableArn:
    Description: "ARN of the Items table"
    Value: !GetAtt ItemsTable.Arn

  ItemPrototypesTableArn:
    Description: "ARN of the ItemPrototypes table"
    Value: !GetAtt ItemPrototypesTable.Arn

  ArchetypesTableArn:
    Description: "ARN of the Archetypes table"
    Value: !GetAtt ArchetypesTable.Arn

  MOTDTableArn:
    Description: "ARN of the MotD table"
    Value: !GetAtt MOTDTable.Arn

  IncrementalCharactersTableArn:
    Description: "ARN of the Incremental Characters table"
    Value: !GetAtt IncrementalCharactersTable.Arn

  ActiveSegmentsTableArn:
    Description: "ARN of the Active Segments table"
    Value: !GetAtt ActiveSegmentsTable.Arn

  StoryRegistryTableArn:
    Description: "ARN of the Story Registry table"
    Value: !GetAtt StoryRegistryTable.Arn

  StoryManifestTableArn:
    Description: "ARN of the Story Manifest table"
    Value: !GetAtt StoryManifestTable.Arn

  CharacterHistoryTableArn:
    Description: "ARN of the Character History table"
    Value: !GetAtt CharacterHistoryTable.Arn

  EidolonDynamoDBPolicyArn:
    Description: "ARN of the Eidolon Engine DynamoDB Read/Write Policy"
    Value: !Ref EidolonDynamoDBPolicy
