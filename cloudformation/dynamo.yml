AWSTemplateFormatVersion: "2010-09-09"
Description: "DynamoDB tables for Eidolon Engine"

Parameters:
  GameName:
    Type: String
    Default: "eidolon"
    Description: "Name of the game"

Resources:
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: players
      AttributeDefinitions:
        - AttributeName: PlayerID
          AttributeType: S
      KeySchema:
        - AttributeName: PlayerID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  CharactersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: characters
      AttributeDefinitions:
        - AttributeName: CharacterID
          AttributeType: S
        - AttributeName: CharacterName
          AttributeType: S
      KeySchema:
        - AttributeName: CharacterID
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CharacterNameIndex
          KeySchema:
            - AttributeName: CharacterName
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  RoomsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: rooms
      AttributeDefinitions:
        - AttributeName: RoomID
          AttributeType: N
      KeySchema:
        - AttributeName: RoomID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  ExitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: exits
      AttributeDefinitions:
        - AttributeName: ExitID
          AttributeType: S
      KeySchema:
        - AttributeName: ExitID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: items
      AttributeDefinitions:
        - AttributeName: ItemID
          AttributeType: S
      KeySchema:
        - AttributeName: ItemID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  ItemPrototypesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: prototypes
      AttributeDefinitions:
        - AttributeName: PrototypeID
          AttributeType: S
      KeySchema:
        - AttributeName: PrototypeID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  ArchetypesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: archetypes
      AttributeDefinitions:
        - AttributeName: ArchetypeName
          AttributeType: S
      KeySchema:
        - AttributeName: ArchetypeName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  MOTDTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: motd
      AttributeDefinitions:
        - AttributeName: MotdID
          AttributeType: S
      KeySchema:
        - AttributeName: MotdID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # Story definition table for incremental game
  StoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: story
      AttributeDefinitions:
        - AttributeName: StoryID
          AttributeType: S
      KeySchema:
        - AttributeName: StoryID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # Segments table for story segments
  SegmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: segments
      AttributeDefinitions:
        - AttributeName: StoryID
          AttributeType: S
        - AttributeName: SegmentID
          AttributeType: S
      KeySchema:
        - AttributeName: StoryID
          KeyType: HASH
        - AttributeName: SegmentID
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # Active segments table for runtime tracking
  ActiveSegmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: active_segments
      AttributeDefinitions:
        - AttributeName: ActiveSegmentID
          AttributeType: S
        - AttributeName: EndTime
          AttributeType: N
        - AttributeName: CharacterID
          AttributeType: S
      KeySchema:
        - AttributeName: ActiveSegmentID
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EndTimeIndex
          KeySchema:
            - AttributeName: EndTime
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: CharacterID-index
          KeySchema:
            - AttributeName: CharacterID
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # Opponents table for combat encounters
  OpponentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: opponents
      AttributeDefinitions:
        - AttributeName: OpponentID
          AttributeType: S
      KeySchema:
        - AttributeName: OpponentID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # History table for tracking story completions
  HistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: history
      AttributeDefinitions:
        - AttributeName: CharacterID
          AttributeType: S
        - AttributeName: StoryID
          AttributeType: S
      KeySchema:
        - AttributeName: CharacterID
          KeyType: HASH
        - AttributeName: StoryID
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # Story history table for tracking individual story attempts
  StoryHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: story_history
      AttributeDefinitions:
        - AttributeName: CharacterID
          AttributeType: S
        - AttributeName: StoryInstanceID
          AttributeType: S
      KeySchema:
        - AttributeName: CharacterID
          KeyType: HASH
        - AttributeName: StoryInstanceID
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  # Segment history table for tracking segment completions
  SegmentHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: segment_history
      AttributeDefinitions:
        - AttributeName: CharacterID
          AttributeType: S
        - AttributeName: ActiveSegmentID
          AttributeType: S
      KeySchema:
        - AttributeName: CharacterID
          KeyType: HASH
        - AttributeName: ActiveSegmentID
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true

  EidolonDynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${GameName}-dynamodb-access"
      Description: !Sub "Policy for accessing ${GameName} Eidolon Engine DynamoDB tables"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
            Resource:
              - !GetAtt PlayersTable.Arn
              - !GetAtt CharactersTable.Arn
              - !Sub "${CharactersTable.Arn}/index/CharacterNameIndex"
              - !GetAtt RoomsTable.Arn
              - !GetAtt ExitsTable.Arn
              - !GetAtt ItemsTable.Arn
              - !GetAtt ItemPrototypesTable.Arn
              - !GetAtt ArchetypesTable.Arn
              - !GetAtt MOTDTable.Arn
              - !GetAtt StoryTable.Arn
              - !GetAtt SegmentsTable.Arn
              - !GetAtt ActiveSegmentsTable.Arn
              - !Sub "${ActiveSegmentsTable.Arn}/index/EndTimeIndex"
              - !Sub "${ActiveSegmentsTable.Arn}/index/CharacterID-index"
              - !GetAtt OpponentsTable.Arn
              - !GetAtt HistoryTable.Arn
              - !GetAtt StoryHistoryTable.Arn
              - !GetAtt SegmentHistoryTable.Arn

Outputs:
  PlayersTableName:
    Description: "DynamoDB table name for players"
    Value: !Ref PlayersTable
    Export:
      Name: !Sub "${AWS::StackName}-PlayersTableName"

  CharactersTableName:
    Description: "DynamoDB table name for characters"
    Value: !Ref CharactersTable
    Export:
      Name: !Sub "${AWS::StackName}-CharactersTableName"

  RoomsTableName:
    Description: "DynamoDB table name for rooms"
    Value: !Ref RoomsTable
    Export:
      Name: !Sub "${AWS::StackName}-RoomsTableName"

  ExitsTableName:
    Description: "DynamoDB table name for exits"
    Value: !Ref ExitsTable
    Export:
      Name: !Sub "${AWS::StackName}-ExitsTableName"

  ItemsTableName:
    Description: "DynamoDB table name for items"
    Value: !Ref ItemsTable
    Export:
      Name: !Sub "${AWS::StackName}-ItemsTableName"

  PrototypesTableName:
    Description: "DynamoDB table name for prototypes"
    Value: !Ref ItemPrototypesTable
    Export:
      Name: !Sub "${AWS::StackName}-PrototypesTableName"

  ArchetypesTableName:
    Description: "DynamoDB table name for archetypes"
    Value: !Ref ArchetypesTable
    Export:
      Name: !Sub "${AWS::StackName}-ArchetypesTableName"

  MotdTableName:
    Description: "DynamoDB table name for motd"
    Value: !Ref MOTDTable
    Export:
      Name: !Sub "${AWS::StackName}-MotdTableName"

  StoryTableName:
    Description: "DynamoDB table name for story"
    Value: !Ref StoryTable
    Export:
      Name: !Sub "${AWS::StackName}-StoryTableName"

  SegmentsTableName:
    Description: "DynamoDB table name for segments"
    Value: !Ref SegmentsTable
    Export:
      Name: !Sub "${AWS::StackName}-SegmentsTableName"

  ActiveSegmentsTableName:
    Description: "DynamoDB table name for active segments"
    Value: !Ref ActiveSegmentsTable
    Export:
      Name: !Sub "${AWS::StackName}-ActiveSegmentsTableName"

  OpponentsTableName:
    Description: "DynamoDB table name for opponents"
    Value: !Ref OpponentsTable
    Export:
      Name: !Sub "${AWS::StackName}-OpponentsTableName"

  HistoryTableName:
    Description: "DynamoDB table name for history"
    Value: !Ref HistoryTable
    Export:
      Name: !Sub "${AWS::StackName}-HistoryTableName"

  StoryHistoryTableName:
    Description: "DynamoDB table name for story history"
    Value: !Ref StoryHistoryTable
    Export:
      Name: !Sub "${AWS::StackName}-StoryHistoryTableName"

  SegmentHistoryTableName:
    Description: "DynamoDB table name for segment history"
    Value: !Ref SegmentHistoryTable
    Export:
      Name: !Sub "${AWS::StackName}-SegmentHistoryTableName"

  DynamoDBAccessPolicyArn:
    Description: "ARN of the DynamoDB access policy"
    Value: !Ref EidolonDynamoDBPolicy
    Export:
      Name: !Sub "${AWS::StackName}-DynamoDBAccessPolicyArn"
