# NOTE: Values marked with 'deployment-generated' are automatically updated by deployment/deploy.py
AWS:
  Region: us-east-1  # deployment-generated
Cognito:  # All Cognito values are deployment-generated
  UserPoolId: us-east-1_xxxxxxxxx
  UserPoolClientId: xxxxxxxxxxxxxxxxxxxxxxxxxx
  UserPoolDomain: eidolon-user-pool
  UserPoolArn: arn:aws:cognito-idp:us-east-1:999999999999:userpool/us-east-1_xxxxxxxxx
Game:
  AutoSave: 5
  Balance: 0.25
  StartingHealth: 10
  StartingEssence: 3
  NamesPath: ./data/names.txt
  ObscenityPath: ./data/obscenity.txt
  TickIntervalSeconds: 1
  RoomItemCleanupSeconds: 600  # 10 minutes
  RoomUnloadSeconds: 3600      # 60 minutes
  CommandTimeoutSeconds: 5
Logging:
  ApplicationName: eidolon-engine
  LogLevel: 20
  LogGroup: /eidolon/game-logs  # deployment-generated (from CloudWatch stack)
  LogStream: system
  MetricNamespace: eidolon/application  # deployment-generated (from CloudWatch stack)
SSH:
  Enabled: true
  PrivateKeyPath: ./server.key
  Port: 9050
  AuthTimeoutSeconds: 30
  AuthBanDurationSeconds: 900  # 15 minutes
  AuthCleanupIntervalSeconds: 300  # 5 minutes
  ConnectionAcceptTimeoutSeconds: 1
Server:
  SessionCleanupIntervalSeconds: 300  # 5 minutes
  SessionIdleTimeoutSeconds: 1800     # 30 minutes
  ConsoleIdleTimeoutSeconds: 30
CloudWatch:
  MetricsIntervalSeconds: 60
  MetricsTimeoutSeconds: 10
  LogFlushTimeoutSeconds: 3
  ShutdownDrainSeconds: 2
