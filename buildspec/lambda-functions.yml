version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing tools for Lambda function packaging

  build:
    commands:
      - echo Building Lambda functions
      - cd lambda

      # Package cognito_new_player function
      - zip cognito_new_player.zip cognito_new_player.py

      # Package api_get_archetypes function
      - zip api_get_archetypes.zip api_get_archetypes.py

      # Package api_save_character function
      - zip api_save_character.zip api_save_character.py

      # Package api_list_characters function
      - zip api_list_characters.zip api_list_characters.py

      # Package api_delete_character function
      - zip api_delete_character.zip api_delete_character.py

      - cd ..

  post_build:
    commands:
      - echo Uploading Lambda functions to S3
      - aws s3 cp lambda/cognito_new_player.zip s3://$S3_BUCKET/cognito_new_player.zip
      - aws s3 cp lambda/api_get_archetypes.zip s3://$S3_BUCKET/api_get_archetypes.zip
      - aws s3 cp lambda/api_save_character.zip s3://$S3_BUCKET/api_save_character.zip
      - aws s3 cp lambda/api_list_characters.zip s3://$S3_BUCKET/api_list_characters.zip
      - aws s3 cp lambda/api_delete_character.zip s3://$S3_BUCKET/api_delete_character.zip

artifacts:
  files:
    - lambda/cognito_new_player.zip
    - lambda/api_get_archetypes.zip
    - lambda/api_save_character.zip
    - lambda/api_list_characters.zip
    - lambda/api_delete_character.zip
  name: lambda-functions
