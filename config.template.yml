# Eidolon Engine Configuration Template
# This template is used by deployment/deploy.py to generate config.yml
# Values will be populated during deployment

# Game configuration
Game:
  name: eidolon-engine
  # Core game settings
  AutoSave: 5
  Balance: 0.25
  StartingHealth: 10
  StartingEssence: 3
  NamesPath: ../data/names.txt
  ObscenityPath: ../data/obscenity.txt
  ScriptsS3Bucket: darkrelics-scripts
  ScriptsS3Prefix: scripts
  TickIntervalSeconds: 1
  RoomItemCleanupSeconds: 600 # 10 minutes
  RoomUnloadSeconds: 3600 # 60 minutes
  CommandTimeoutSeconds: 5
  PlayerIdleTimeoutSeconds: 900 # 15 minutes
  PortalS3Bucket: darkrelics-portal
  PortalUrl: "" # deployment-generated

# Deployment mode: 'mud', 'incremental', or 'hybrid'
# - mud: MUD mode with Portal frontend
# - incremental: Incremental mode with Incremental frontend
# - hybrid: Hybrid mode with Incremental frontend (supports both game types)
Deployment:
  Mode: hybrid

# AWS configuration
AWS:
  region: us-east-1
  contact_email: contact@darkrelics.net
  ServerExecutionRoleArn: ""

# DynamoDB tables
DynamoDB:
  Tables:
    Players: players
    Characters: characters
    Items: items
    Archetypes: archetypes
    Story: story
    Rooms: rooms
    Exits: exits
    Prototypes: prototypes
    Motd: motd
  AccessPolicyArn: "" # deployment-generated

# API configuration (required)
API:
  Domain: "" # REQUIRED - Your domain name
  HostedZoneId: "" # REQUIRED - Route53 hosted zone ID
  Subdomain: api # api.{domain}

# CORS configuration - allowed origins for all modes
CORS:
  AllowedOrigins: [] # deployment-generated

# Cognito configuration
Cognito:
  user_pool_id: "" # deployment-generated
  app_client_id: "" # deployment-generated
  UserPoolDomain: "" # deployment-generated
  UserPoolArn: "" # deployment-generated

# CloudFront distribution
CloudFront:
  distribution_id: "" # deployment-generated
  domain_name: "" # deployment-generated
  portal_url: "" # deployment-generated

# CloudWatch configuration
CloudWatch:
  MetricsIntervalSeconds: 60
  MetricsTimeoutSeconds: 10
  LogFlushTimeoutSeconds: 3
  ShutdownDrainSeconds: 2
  log_group: /aws/eidolon/server # deployment-generated
  metrics_namespace: eidolon/metrics # deployment-generated
  AccessPolicyArn: "" # deployment-generated

# Logging configuration
Logging:
  ApplicationName: eidolon-engine
  LogLevel: 20
  cloudwatch:
    log_group: /aws/eidolon/server # deployment-generated
    metrics_namespace: eidolon/metrics # deployment-generated
  LogGroup: /aws/eidolon/server # deployment-generated (legacy support)
  LogStream: system
  MetricNamespace: eidolon/metrics # deployment-generated (legacy support)

# SSH configuration
SSH:
  Enabled: true
  PrivateKeyPath: ./server.key
  Port: 9050
  AuthTimeoutSeconds: 30
  AuthBanDurationSeconds: 900 # 15 minutes
  AuthCleanupIntervalSeconds: 300 # 5 minutes
  ConnectionAcceptTimeoutSeconds: 1

# Server configuration
Server:
  SessionCleanupIntervalSeconds: 300 # 5 minutes
  SessionIdleTimeoutSeconds: 1800 # 30 minutes
  ConsoleIdleTimeoutSeconds: 300

# CodeBuild configuration
CodeBuild:
  PortalBuildspecPath: buildspec/portal.yml # Used for MUD mode
  IncrementalBuildspecPath: buildspec/incremental.yml # Used for Incremental/Hybrid modes
  ProjectName: "" # deployment-generated
  PortalS3Bucket: "" # deployment-generated

# S3 buckets (optional - will create new if not specified)
S3:
  PortalBucket: "" # deployment-generated
  ScriptsBucket: "" # deployment-generated

# GitHub configuration
GitHub:
  Owner: robinje
  Repo: eidolon-engine
  Branch: develop

# Contact configuration
Contact:
  Email: contact@darkrelics.net
