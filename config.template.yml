# NOTE: Values marked with 'deployment-generated' are automatically updated by deployment/deploy.py
AWS:
  Region: us-east-1 # deployment-generated
  ServerExecutionRoleArn: arn:aws:iam::999999999999:role/eidolon-engine-server-execution-role # deployment-generated
CloudFront: # All CloudFront values are deployment-generated
  distribution_id: E1234567890ABC
  domain_name: d1234567890.cloudfront.net
  portal_url: https://d1234567890.cloudfront.net
CloudWatch:
  MetricsIntervalSeconds: 60
  MetricsTimeoutSeconds: 10
  LogFlushTimeoutSeconds: 3
  ShutdownDrainSeconds: 2
  AccessPolicyArn: arn:aws:iam::999999999999:policy/eidolon-cloudwatch-access # deployment-generated
Cognito: # All Cognito values are deployment-generated
  UserPoolId: us-east-1_xxxxxxxxx
  UserPoolClientId: xxxxxxxxxxxxxxxxxxxxxxxxxx
  UserPoolDomain: eidolon-users
  UserPoolArn: arn:aws:cognito-idp:us-east-1:999999999999:userpool/us-east-1_xxxxxxxxx
CodeBuild: # All CodeBuild values are deployment-generated
  ProjectName: eidolon-portal-build
  PortalS3Bucket: eidolon-portal
DynamoDB: # All DynamoDB values are deployment-generated
  Tables:
    Players: eidolon-players
    Characters: eidolon-characters
    Rooms: eidolon-rooms
    Exits: eidolon-exits
    Items: eidolon-items
    Prototypes: eidolon-prototypes
    Archetypes: eidolon-archetypes
    Motd: eidolon-motd
  AccessPolicyArn: arn:aws:iam::999999999999:policy/eidolon-dynamodb-access
Game:
  AutoSave: 5
  Balance: 0.25
  StartingHealth: 10
  StartingEssence: 3
  NamesPath: ../data/names.txt
  ObscenityPath: ../data/obscenity.txt
  ScriptsS3Bucket: eidolon-scripts # deployment-generated
  ScriptsS3Prefix: scripts
  TickIntervalSeconds: 1
  RoomItemCleanupSeconds: 600 # 10 minutes
  RoomUnloadSeconds: 3600 # 60 minutes
  CommandTimeoutSeconds: 5
  PlayerIdleTimeoutSeconds: 900 # 15 minutes
API: # Required - API Gateway custom domain configuration
  Domain: darkrelics.net # Your domain name (REQUIRED)
  Subdomain: api # Subdomain for API (default: api)
  HostedZoneId: Z1234567890ABC # Route53 hosted zone ID for the domain (REQUIRED)
Logging:
  ApplicationName: eidolon-engine
  LogLevel: 20
  LogGroup: /aws/eidolon/server # deployment-generated (from CloudWatch stack)
  LogStream: system
  MetricNamespace: eidolon/metrics # deployment-generated (from CloudWatch stack)
SSH:
  Enabled: true
  PrivateKeyPath: ./server.key
  Port: 9050
  AuthTimeoutSeconds: 30
  AuthBanDurationSeconds: 900 # 15 minutes
  AuthCleanupIntervalSeconds: 300 # 5 minutes
  ConnectionAcceptTimeoutSeconds: 1
Server:
  SessionCleanupIntervalSeconds: 300 # 5 minutes
  SessionIdleTimeoutSeconds: 1800 # 30 minutes
  ConsoleIdleTimeoutSeconds: 300
